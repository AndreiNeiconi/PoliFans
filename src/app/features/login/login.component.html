<div class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="card login-card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: #17187D;">PoliFans</h2>
                <p class="text-muted">Connect with your fellow students</p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="form-label small fw-bold">University Email</label>
                    <input type="email" class="form-control" placeholder="name@student.uni.ro">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button (click)="onLogin()" class="btn btn-polifans py-2" type="submit">
                        Sign In
                    </button>
                    <button class="btn btn-outline-secondary py-2" type="button">
                        <i class="bi bi-google me-2"></i> Student Mail Login
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <small>Don't have an account? <a routerLink="/register" routerLinkActive="active-link" class="text-decoration-none"
                        style="color: #17187D;">Register</a></small>
            </div>
        </div>
    </div>
</div>

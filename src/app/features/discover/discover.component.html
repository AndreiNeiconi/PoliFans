<div class="container py-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="input-group shadow-sm rounded-pill overflow-hidden">
                <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control border-0" placeholder="Search by major, project, or name...">
                <button class="btn btn-polifans px-4">Search</button>
            </div>
        </div>
    </div>

    <h5 class="mb-3 fw-bold" style="color: var(--pf-primary);">Suggested for You</h5>

    <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card h-100 border-0 shadow-sm text-center p-3 hover-lift">
                <div class="position-relative d-inline-block mx-auto mb-2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"
                        class="rounded-circle border border-3 border-primary" width="80" alt="Profile">
                    <span class="position-absolute bottom-0 end-0 badge rounded-pill bg-success p-1">
                        <span class="visually-hidden">Online</span>
                    </span>
                </div>
                <h6 class="mb-1">David Chen</h6>
                <p class="small text-muted mb-3">AI & Robotics</p>
                <button class="btn btn-outline-primary btn-sm w-100 rounded-pill">Connect</button>
            </div>
        </div>

        <div class="row g-4">
            @for (item of [1,2,3,4,5,6]; track $index) {
            <div class="col-md-4 col-6">
                <div class="pf-card text-center p-4">
                </div>
            </div>
            }
        </div>

    </div>

    <div class="mt-5">
        <h5 class="fw-bold" style="color: var(--pf-primary);">Trending Topics</h5>
        <div class="d-flex flex-wrap gap-2 mt-3">
            <span class="badge rounded-pill bg-light text-dark p-2 px-3 border">#CalculusHelp</span>
            <span class="badge rounded-pill bg-light text-dark p-2 px-3 border">#ThesisCollab</span>
            <span class="badge rounded-pill bg-light text-dark p-2 px-3 border">#Hackathon2026</span>
        </div>
    </div>
</div>

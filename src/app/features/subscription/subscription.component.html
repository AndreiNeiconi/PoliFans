<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold m-0" style="color: #17187D;">Student Groups</h3>
        <button class="btn btn-polifans shadow-sm">
            <i class="bi bi-plus-circle me-2"></i>Create Group-
        </button>
    </div>

    <div class="row g-4">
        @for (group of groups; track group.id) {
        <div class="col-md-6 col-lg-4">
            <div class="pf-card h-100 p-0 overflow-hidden">
                <div class="group-banner" [style.background-color]="group.color"></div>

                <div class="p-3 position-relative">
                    <div class="group-icon shadow-sm">
                        <i class="bi" [class]="group.icon"></i>
                    </div>

                    <div class="mt-5">
                        <h5 class="fw-bold mb-1">{{ group.name }}</h5>
                        <p class="text-muted small mb-3">{{ group.description }}</p>

                        <div class="d-flex align-items-center justify-content-between mb-3 p-2 bg-light rounded-3">
                            <div class="text-center flex-grow-1">
                                <div class="fw-bold">{{ group.members }}</div>
                                <div class="x-small text-uppercase text-muted">Members</div>
                            </div>
                            <div class="vr mx-2"></div>
                            <div class="text-center flex-grow-1">
                                <div class="fw-bold">{{ group.posts }}</div>
                                <div class="x-small text-uppercase text-muted">Posts</div>
                            </div>
                        </div>

                        <button class="btn w-100 rounded-pill py-2 fw-bold shadow-sm"
                            [class.btn-polifans]="!group.joined" [class.btn-outline-secondary]="group.joined">
                            {{ group.joined ? 'Already a Member' : 'Join Community' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
</div>
